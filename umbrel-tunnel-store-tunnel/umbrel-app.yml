manifestVersion: 1
id: umbrel-tunnel-store-tunnel
name: Tunnel
tagline: Expón tu servidor al mundo sin tocar el router
icon: https://raw.githubusercontent.com/miniweed/umbrel-tunnel-store/main/umbrel-tunnel-store-tunnel/icon.svg
category: networking
version: "1.0.0"
port: 3000
description: >-
  Conecta tu Umbrel a un VPS propio y expón servicios a internet sin abrir puertos
  en tu router. Alternativa 100% self-hosted a Cloudflare Tunnel. Funciona detrás
  de CGNAT. Usa WireGuard para cifrado extremo a extremo y Caddy para HTTPS
  automático con Let's Encrypt.
developer: miniweed
website: https://github.com/miniweed/umbrel-tunnel-store
repo: https://github.com/miniweed/umbrel-tunnel-store
support: https://github.com/miniweed/umbrel-tunnel-store/issues
gallery:
  - https://raw.githubusercontent.com/miniweed/umbrel-tunnel-store/main/umbrel-tunnel-store-tunnel/screenshot-1.png
releaseNotes: >-
  Primera versión. WireGuard client + Caddy reverse proxy con Let's Encrypt.
dependencies: []
defaultPassword: ""
