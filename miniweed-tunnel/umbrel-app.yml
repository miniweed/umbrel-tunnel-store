manifestVersion: 1
id: miniweed-tunnel
name: Tunnel
tagline: Expón tu servidor al mundo sin tocar el router
icon: https://raw.githubusercontent.com/miniweed/umbrel-app-store/main/miniweed-tunnel/icon.png
category: networking
version: "1.6.20"
port: 3016
description: >-
  Conecta tu Umbrel a un VPS propio y expón servicios a internet sin abrir puertos
  en tu router. Alternativa 100% self-hosted a Cloudflare Tunnel. Funciona detrás
  de CGNAT. Usa WireGuard para cifrado extremo a extremo y Caddy para HTTPS
  automático con Let's Encrypt.
developer: miniweed
website: https://github.com/miniweed/umbrel-app-store
repo: https://github.com/miniweed/umbrel-app-store
support: https://github.com/miniweed/umbrel-app-store/issues
gallery: []
releaseNotes: >-
  Hotfix de permisos persistentes: el contenedor web se alinea al usuario `node` (UID/GID 1000) para escribir en `${APP_DATA_DIR}/data` de Umbrel sin `EACCES` al guardar config o generar claves. Se mantiene el fix de `wg-ready` de `1.6.19` y se actualiza imagen `web` a `1.6.20`.
dependencies: []
defaultPassword: ""
