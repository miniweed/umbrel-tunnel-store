services:

  app_proxy:
    environment:
      APP_HOST: miniweed-tunnel_web_1
      APP_PORT: 3016
      PROXY_AUTH_ADD: "true"

  web:
    image: ghcr.io/miniweed/umbrel-tunnel-web:1.3.15@sha256:a5a01648df038341a417991523d9ae401a5b633c3c7554aae93044fb04dd044a
    restart: on-failure
    stop_grace_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      - DATA_DIR=/data
      - WG_API_HOST=wg
      - PORT=3016
      - TUNNEL_API_TOKEN=${APP_SEED}

  caddy:
    image: caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    restart: on-failure
    stop_grace_period: 30s
    network_mode: "service:wg"
    depends_on:
      - wg
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/caddy/data:/data/caddy
      - ${APP_DATA_DIR}/caddy/config:/config
    environment:
      - XDG_DATA_HOME=/data/caddy
    command:
      - sh
      - -c
      - |
        until [ -s /data/Caddyfile ] && [ -f /data/wg-ready ]; do
          echo "[caddy] Waiting for Caddyfile and WireGuard tunnel..."
          sleep 2
        done
        exec caddy run --config /data/Caddyfile --adapter caddyfile --watch

  wg:
    image: ghcr.io/miniweed/umbrel-tunnel-wg:1.0.3@sha256:8683aeea35541f42a7004219ce36cebcd649d9ec3c8ad3ce126f7b2595d8332f
    restart: on-failure
    stop_grace_period: 30s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ${APP_DATA_DIR}/data:/data
