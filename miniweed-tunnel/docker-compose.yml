services:

  app_proxy:
    environment:
      APP_HOST: miniweed-tunnel_web_1
      APP_PORT: 3016
      PROXY_AUTH_ADD: "true"

  web:
    image: ghcr.io/miniweed/umbrel-tunnel-web:1.5.4@sha256:74bbb0481b49952988312b760a67c7f67ddb6efd27d62a522aacc4dbddbc7b6b
    restart: on-failure
    stop_grace_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ./web/server.js:/app/server.js:ro
      - ./web/api-spec:/app/api-spec:ro
      - ./web/lib:/app/lib:ro
      - ./web/public:/app/public:ro
    environment:
      - DATA_DIR=/data
      - WG_API_HOST=wg
      - PORT=3016
      - APP_SEED=${APP_SEED}

  caddy:
    image: caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    restart: on-failure
    stop_grace_period: 30s
    network_mode: "service:wg"
    depends_on:
      - wg
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/caddy/data:/data/caddy
      - ${APP_DATA_DIR}/caddy/config:/config
    environment:
      - XDG_DATA_HOME=/data/caddy
    command:
      - sh
      - -c
      - |
        until [ -s /data/Caddyfile ] && [ -f /data/wg-ready ]; do
          echo "[caddy] Waiting for Caddyfile and WireGuard tunnel..."
          sleep 2
        done
        exec caddy run --config /data/Caddyfile --adapter caddyfile --watch

  wg:
    image: ghcr.io/miniweed/umbrel-tunnel-wg:1.0.4@sha256:9d7c7c3f005029cabdece1c23adbb48dd5e9d864f8548f7f791ff7876badf260
    restart: on-failure
    stop_grace_period: 30s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ${APP_DATA_DIR}/data:/data
