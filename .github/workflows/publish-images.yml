name: publish-images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract versions
        id: versions
        run: |
          APP_VERSION=$(python3 - <<'PY'
import re
from pathlib import Path
text = Path('miniweed-tunnel/umbrel-app.yml').read_text(encoding='utf-8')
m = re.search(r'^version:\s*"([^"]+)"', text, re.M)
if not m:
    raise SystemExit('umbrel-app.yml version not found')
print(m.group(1))
PY
)
          WG_VERSION=$(python3 - <<'PY'
import re
from pathlib import Path
text = Path('miniweed-tunnel/docker-compose.yml').read_text(encoding='utf-8')
m = re.search(r'umbrel-tunnel-wg:([^@\s]+)', text)
if not m:
    raise SystemExit('wg image version not found in docker-compose.yml')
print(m.group(1))
PY
)
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wg_version=${WG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: miniweed-tunnel/web
          file: miniweed-tunnel/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-web:${{ steps.versions.outputs.app_version }}
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-web:main

      - name: Build and push wg image
        uses: docker/build-push-action@v6
        with:
          context: miniweed-tunnel/wg-client
          file: miniweed-tunnel/wg-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-wg:${{ steps.versions.outputs.wg_version }}
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-wg:main
